# TYPE  DATABASE        USER            ADDRESS                 METHOD
# 1. Local administrative access (UNIX socket)
local   all             postgres                                peer

# 2. Local user access (UNIX socket)
local   all             all                                     scram-sha-256

# 3. IPv4 local loopback (connections from localhost)
host    all             all             127.0.0.1/32            scram-sha-256

# 4. IPv6 local loopback (connections from localhost)
host    all             all             ::1/128                 scram-sha-256

# 5. Remote network access (uncomment and update IP if needed)
# host  all             all             192.168.1.0/24          scram-sha-256

host    all             all             172.17.0.0/16           scram-sha-256
